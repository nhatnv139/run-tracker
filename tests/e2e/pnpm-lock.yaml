lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    devDependencies:
      '@playwright/test':
        specifier: ^1.49.0
        version: 1.49.0
      typescript:
        specifier: ^5.6.0
        version: 5.6.3

packages:

  '@playwright/test@1.49.0':
    resolution: {integrity: sha512-PLACEHOLDER}
    engines: {node: '>=18'}
    hasBin: true

  playwright-core@1.49.0:
    resolution: {integrity: sha512-PLACEHOLDER}
    engines: {node: '>=18'}
    hasBin: true

  playwright@1.49.0:
    resolution: {integrity: sha512-PLACEHOLDER}
    engines: {node: '>=18'}
    hasBin: true

  typescript@5.6.3:
    resolution: {integrity: sha512-PLACEHOLDER}
    engines: {node: '>=14.17'}
    hasBin: true

snapshots:

  '@playwright/test@1.49.0':
    dependencies:
      playwright: 1.49.0

  playwright-core@1.49.0: {}

  playwright@1.49.0:
    dependencies:
      playwright-core: 1.49.0

  typescript@5.6.3: {}
