name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  title-lint:
    name: PR Title (Conventional Commits)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            refactor
            docs
            test
            ci
            build
            perf
            revert
          requireScope: false
          subjectPattern: ^[A-Za-z0-9].+$
          subjectPatternError: |
            The subject of the PR title must start with an alphanumeric character and not be empty.

  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff size
        id: size
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          ADD=$(git diff --shortstat "$BASE_SHA" "$HEAD_SHA" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          DEL=$(git diff --shortstat "$BASE_SHA" "$HEAD_SHA" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo 0)
          TOTAL=$((ADD + DEL))
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "PR diff LOC: $TOTAL"

      - name: Warn on large PR
        if: steps.size.outputs.total != '' && fromJSON(steps.size.outputs.total) > 500
        uses: actions/github-script@v7
        with:
          script: |
            const total = ${{ steps.size.outputs.total }};
            const body = `:warning: This PR contains **${total}** changed lines, which exceeds the recommended 500 LOC threshold. Consider splitting into smaller PRs for easier review.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  changelog-required:
    name: Changelog Entry Required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG modification
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -qE '"skip-changelog"|"type:chore"|"dependencies"'; then
            echo "Skip-changelog label present; skipping check."
            exit 0
          fi
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qiE '^(CHANGELOG\.md|changelog\.md|docs/CHANGELOG\.md|\.changeset/)'; then
            echo "Changelog entry found."
            exit 0
          fi
          echo "::error::No CHANGELOG entry found. Add an entry to CHANGELOG.md or use label 'skip-changelog'."
          exit 1

  auto-label:
    name: Auto Label by Path
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Apply labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
