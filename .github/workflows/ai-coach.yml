name: AI Coach CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'ai-coach/**'
      - '.github/workflows/ai-coach.yml'
  pull_request:
    paths:
      - 'ai-coach/**'
      - '.github/workflows/ai-coach.yml'

concurrency:
  group: ai-coach-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: ai-coach

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  UV_VERSION: '0.5.11'
  IMAGE_NAME: ghcr.io/runvie/ai-coach

jobs:
  lint:
    name: Lint and Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: 'ai-coach/uv.lock'

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy --strict .

  test:
    name: Pytest with coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    permissions:
      contents: read
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: 'ai-coach/uv.lock'

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Run pytest
        run: uv run pytest -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: ai-coach-coverage-${{ github.sha }}
          path: ai-coach/coverage.xml
          retention-days: 14

  build-docker:
    name: Build and Push Docker
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ai-coach
          file: ai-coach/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: ai-coach-staging
    permissions:
      contents: read
    concurrency:
      group: ai-coach-staging
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        if: env.FLY_API_TOKEN != ''
        run: flyctl deploy --remote-only --config ai-coach/fly.staging.toml --image ghcr.io/runvie/ai-coach:sha-${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Authenticate GCP
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/auth@v2
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/setup-gcloud@v2
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        if: env.GCP_SA_KEY != ''
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          gcloud run deploy ai-coach-staging \
            --image ghcr.io/runvie/ai-coach:sha-${{ github.sha }} \
            --region asia-southeast1 \
            --platform managed \
            --allow-unauthenticated \
            --quiet
