name: Flutter CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/flutter.yml'

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: app

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.27.0'
  FLUTTER_CHANNEL: 'stable'

jobs:
  format-check:
    name: Dart Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Dart format check
        run: dart format --output=none --set-exit-if-changed lib test

  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
          pub-cache-key: 'flutter-pub-:os:-:channel:-:version:-:arch:-:hash:'

      - name: Pub get
        run: flutter pub get

      - name: Flutter analyze (fatal warnings)
        run: flutter analyze --fatal-infos --fatal-warnings

  test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [format-check, analyze]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage-${{ github.sha }}
          path: app/coverage/lcov.info
          retention-days: 14

  build-android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [analyze, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            app/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/android/**/*.gradle*', 'app/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build APK release
        run: flutter build apk --release

      - name: Build App Bundle release
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.sha }}
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ github.sha }}
          path: app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest
    timeout-minutes: 40
    needs: [analyze, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Pod install
        working-directory: app/ios
        run: pod install --repo-update

      - name: Build iOS (no codesign)
        run: flutter build ipa --no-codesign

      - name: Upload iOS archive
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ios-${{ github.sha }}
          path: app/build/ios/archive/*.xcarchive
          retention-days: 30

      - name: Note about production signing
        run: echo "Production iOS signed builds are produced by Codemagic, not this workflow."
