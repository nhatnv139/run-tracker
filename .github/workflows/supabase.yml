name: Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase.yml'
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase.yml'

concurrency:
  group: supabase-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Supabase Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Lint migrations
        working-directory: supabase
        run: supabase db lint --linked=false || supabase db lint

  validate:
    name: Validate Migrations against Postgres
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: runvie_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply migrations in order
        env:
          PGPASSWORD: postgres
        run: |
          shopt -s nullglob
          for f in supabase/migrations/*.sql; do
            echo "Applying $f"
            psql -h localhost -U postgres -d runvie_test -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Verify schema via \d
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d runvie_test -c '\dt'
          psql -h localhost -U postgres -d runvie_test -c '\d+'

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: supabase-staging
    permissions:
      contents: read
    concurrency:
      group: supabase-staging
      cancel-in-progress: false
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link staging project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}

      - name: Push migrations to staging
        run: supabase db push --linked

  deploy-production:
    name: Deploy Production (manual approval)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: supabase-production
    permissions:
      contents: read
    concurrency:
      group: supabase-production
      cancel-in-progress: false
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF_PROD }}

      - name: Push migrations to production
        run: supabase db push --linked
