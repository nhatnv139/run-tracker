name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      previous-tag: ${{ steps.prev.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          echo "tag=$PREV" >> $GITHUB_OUTPUT

      - name: Build changelog
        id: changelog
        run: |
          if [ -z "${{ steps.prev.outputs.tag }}" ]; then
            RANGE=""
          else
            RANGE="${{ steps.prev.outputs.tag }}..${GITHUB_REF_NAME}"
          fi
          {
            echo "changelog<<EOF"
            git log $RANGE --pretty=format:'- %s (%h)' --no-merges
            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changelog
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RunVie ${{ github.ref_name }}
          body: |
            ## What's changed

            ${{ needs.changelog.outputs.changelog }}

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ needs.changelog.outputs.previous-tag }}...${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  tag-docker-stable:
    name: Tag Docker images as stable
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: github-release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install regctl
        uses: regclient/actions/regctl-installer@main

      - name: Tag ai-coach :stable and :version
        run: |
          SRC="ghcr.io/runvie/ai-coach:latest"
          regctl image copy "$SRC" "ghcr.io/runvie/ai-coach:stable"
          regctl image copy "$SRC" "ghcr.io/runvie/ai-coach:${{ github.ref_name }}"

  notify:
    name: Notify Webhooks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [github-release, tag-docker-stable]
    permissions:
      contents: read
    steps:
      - name: Slack notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"RunVie ${{ github.ref_name }} released: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}\"}" \
            "$SLACK_WEBHOOK_URL"

      - name: Discord notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            -d "{\"content\":\"RunVie ${{ github.ref_name }} released: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}\"}" \
            "$DISCORD_WEBHOOK_URL"
