version: 2

updates:
  - package-ecosystem: npm
    directory: /landing
    schedule:
      interval: daily
      time: '02:00'
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:landing
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      landing-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        schedule:
          interval: weekly
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: pip
    directory: /ai-coach
    schedule:
      interval: daily
      time: '02:00'
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:ai-coach
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      ai-coach-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        schedule:
          interval: weekly
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: pub
    directory: /app
    schedule:
      interval: daily
      time: '02:00'
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:app
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      app-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        schedule:
          interval: weekly
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /ai-coach
    schedule:
      interval: daily
      time: '02:00'
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area:ai-coach
      - docker
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      docker-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        schedule:
          interval: weekly
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '02:00'
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
      include: scope
    groups:
      gha-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        schedule:
          interval: weekly
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
