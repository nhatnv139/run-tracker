name: runvie
description: RunVie - Vietnamese running tracker with AI coaching, gamification and social.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.0

  # Backend
  supabase_flutter: ^2.5.6

  # Auth providers
  sign_in_with_apple: ^6.1.2
  google_sign_in: ^6.2.1
  crypto: ^3.0.3

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Monetization (stub-friendly)
  purchases_flutter: ^8.1.2

  # Sensors & GPS
  geolocator: ^12.0.0
  flutter_background_service: ^5.0.10
  permission_handler: ^11.3.1
  pedometer: ^4.0.2
  sensors_plus: ^6.0.1
  health: ^11.1.0
  vibration: ^2.0.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.2.2
  share_plus: ^10.0.2
  url_launcher: ^6.3.0

  # Models / codegen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Env
  flutter_dotenv: ^5.2.1

  # AI Coach + Voice Coach
  dio: ^5.7.0
  uuid: ^4.5.1
  flutter_tts: ^4.2.0
  audio_session: ^0.1.21
  connectivity_plus: ^6.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.20.2
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/voice-scripts/
    - assets/voice/
