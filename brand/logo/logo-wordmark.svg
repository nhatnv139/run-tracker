          stroke="url(#rv-wm-arrow)"
          stroke-width="7.5"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
  <text x="165"
        y="108"
        font-family="'Be Vietnam Pro', system-ui, sans-serif"
        font-weight="800"
        font-size="92"
        letter-spacing="-3"
