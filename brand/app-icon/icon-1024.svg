<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="rv-appicon-title">
  <title id="rv-appicon-title">RunVie iOS app icon</title>
  <defs>
    <linearGradient id="rv-app-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5A36"/>
